version: "3.8"

services:
  app:
    build: .
    container_name: bonicare_app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - MONGO_URI=mongodb://mongo:27017/bonicare
    depends_on:
      - mongo

  mongo:
    image: mongo:6
    container_name: bonicare_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
