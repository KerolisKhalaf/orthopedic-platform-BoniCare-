name: Node.js CI

on:
  push:
    branches: [ main, backend/main, backend/auth ]
  pull_request:
    branches: [ main, backend/main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm ci
      - name: Run lint (if configured)
        run: echo "No linter configured"
      - name: Run test
        run: npm test
