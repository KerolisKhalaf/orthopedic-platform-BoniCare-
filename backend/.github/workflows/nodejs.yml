name: Backend Tests

on:
  push:
    branches: [ main, backend/main, backend/auth ]
  pull_request:
    branches: [ main, backend/main, backend/auth ] 

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
