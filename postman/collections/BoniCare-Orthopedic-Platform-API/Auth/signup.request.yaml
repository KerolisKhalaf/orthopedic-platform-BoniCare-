$kind: http-request
name: Register a new user
method: POST
url: '{{baseUrl}}/api/v1/auth/signup'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "John Doe",
      "email": "john@example.com",
      "password": "password123",
      "phone": "+1234567890",
      "role": "patient"
    }
