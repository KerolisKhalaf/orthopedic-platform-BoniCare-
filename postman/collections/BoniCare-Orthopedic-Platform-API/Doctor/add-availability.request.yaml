$kind: http-request
name: Add availability slot
method: POST
url: '{{baseUrl}}/api/v1/doctor/availability'
order: 4000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "dayOfWeek": "Monday",
      "startTime": "09:00",
      "endTime": "17:00"
    }
